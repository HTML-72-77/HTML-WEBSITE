<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accessories | HTML 7277</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .zoom-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .zoom-overlay img {
      max-width: 90vw;
      max-height: 90vh;
    }
    .zoom-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 24px;
      color: white;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    .accessories-grid div,
    .accessories-row div {
      position: relative;
    }
    .caption {
      position: absolute;
      bottom: 10%;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 10px;
      font-family: 'Helvetica Neue', sans-serif;
      color: black;
      background: none;
      padding: 2px 0;
    }
  </style>
</head>
<body>
  <header class="menu-header">
    <div class="logo">
      <a href="index.html">
        <img src="images/HTML MAIN LOGO.png" alt="HTML 7277 Logo" />
      </a>
    </div>
    <nav class="main-nav-top">
      <div class="dropdown">
        <a href="collection.html" class="dropdown-toggle">COLLECTION</a>
        <div class="dropdown-menu">
          <a href="25.2.html">25.2</a>
        </div>
      </div>
      <a href="accessories.html">ACCESSORIES</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html">CONTACT</a>
    </nav>
  </header>

  <main class="accessories-main">
    <section class="accessories-intro">
      <h1>ACCESSORIES</h1>
      <p>Objects reflecting functionality and ideology.<br />By HTML 7277</p>
    </section>

    <!-- 🧱 2칸짜리 그리드 -->
    <div class="accessories-row">
      <div class="half" style="background-color: #f0f0f0; height: 300px;"></div>
      <div class="half">
        <img src="images/acc1.jpg" alt="acc1" onclick="zoomImage(this)" />
        <div class="caption">ACC 1</div>
      </div>
    </div>

    <!-- 🧱 4칸짜리 그리드 -->
    <div class="accessories-grid">
      <div><img src="images/acc2.jpg" alt="acc2" onclick="zoomImage(this)" /><div class="caption">ACC 2</div></div>
      <div><img src="images/acc3.jpg" alt="acc3" onclick="zoomImage(this)" /><div class="caption">ACC 3</div></div>
      <div><img src="images/acc4.jpg" alt="acc4" onclick="zoomImage(this)" /><div class="caption">ACC 4</div></div>
      <div><img src="images/acc5.jpg" alt="acc5" onclick="zoomImage(this)" /><div class="caption">ACC 5</div></div>
    </div>

    <div class="accessories-grid">
      <div><img src="images/acc6.jpg" alt="acc6" onclick="zoomImage(this)" /><div class="caption">ACC 6</div></div>
      <div><img src="images/acc7.jpg" alt="acc7" onclick="zoomImage(this)" /><div class="caption">ACC 7</div></div>
      <div><img src="images/acc8.jpg" alt="acc8" onclick="zoomImage(this)" /><div class="caption">ACC 8</div></div>
      <div><img src="images/acc9.jpg" alt="acc9" onclick="zoomImage(this)" /><div class="caption">ACC 9</div></div>
    </div>

    <!-- 🧱 2칸짜리 그리드 -->
    <div class="accessories-row">
      <div class="half">
        <img src="images/acc10.jpg" alt="acc10" onclick="zoomImage(this)" />
        <div class="caption">ACC 10</div>
      </div>
      <div class="half">
        <img src="images/acc11.jpg" alt="acc11" onclick="zoomImage(this)" />
        <div class="caption">ACC 11</div>
      </div>
    </div>

    <!-- 🔁 반복 이미지 예시 (4칸) -->
    <div class="accessories-grid">
      <div><img src="images/acc12.jpg" alt="acc12" onclick="zoomImage(this)" /><div class="caption">ACC 12</div></div>
      <div><img src="images/acc13.jpg" alt="acc13" onclick="zoomImage(this)" /><div class="caption">ACC 13</div></div>
      <div style="background-color: #f0f0f0; height: 300px;"></div>
      <div style="background-color: #f0f0f0; height: 300px;"></div>
    </div>

    <div class="zoom-overlay" id="zoomOverlay">
      <div class="zoom-close" onclick="closeZoom()">✕</div>
      <img id="zoomedImg" src="" alt="Zoomed Image" />
    </div>
  </main>

  <script>
    function zoomImage(img) {
      const overlay = document.getElementById('zoomOverlay');
      const zoomedImg = document.getElementById('zoomedImg');
      zoomedImg.src = img.src;
      overlay.style.display = 'flex';
    }
    function closeZoom() {
      document.getElementById('zoomOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
